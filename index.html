<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bias Blindspot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-top-capsule">
        <div id="gem-counter">💎 <span id="score-val">0</span> Gems</div>
        <div id="debug-coords" class="debug-info"></div>
    </div>

    <div id="ui-bottom-bar">
        <button id="scan-btn" class="tool-btn">
            <span class="btn-icon">📡</span>
            <span class="btn-text">Scan Umgebung</span>
            <span class="btn-cost">(10 💎)</span>
        </button>
        <button class="tool-btn locked" disabled>
            <span class="btn-icon">🔒</span>
            <span class="btn-text">Slot leer</span>
        </button>
        <button class="tool-btn locked" disabled>
            <span class="btn-icon">🔒</span>
            <span class="btn-text">Slot leer</span>
        </button>
    </div>

    <div id="grid-stage"></div>
    <script src="game.js"></script>
</body>
</html>

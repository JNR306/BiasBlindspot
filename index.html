<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bias Blindspot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="info-btn" onclick="showInfo()">?</button>

    <div id="ui-top-capsule" class="glass-ui">
        <div>Gems: <span id="score-val">0</span></div>
        <div>Best: <span id="highscore-val">0</span></div>
    </div>

    <div id="grid-stage"></div>

    <div id="ui-bottom-bar" class="glass-ui">
        <button id="scan-btn" class="tool-btn" onclick="buyTool('scan')">🔍 Scan (10G)</button>
        <button id="safety-btn" class="tool-btn" onclick="buyTool('safety')">🛡️ Safe-Booster (50G)</button>
        <button id="luck-btn" class="tool-btn" onclick="buyTool('luck')">🍀 Glücks-Booster (60G)</button>
    </div>

    <div id="loader">
        <div class="scan-line"></div>
        <div class="loader-text">INITIALISIERE WELT...</div>
    </div>

    <div id="toast-message" class="hidden">Nicht genug Gems! (10 nötig)</div>

    <div id="game-over-screen" class="hidden">
        <h1 style="color: #ff4b4b;">EXPLOSION!</h1>
        <p>Du bist auf eine Mine mit <span id="mine-chance-val">0</span>% Risiko getreten.</p>
        <div id="final-score">Gems gesammelt: 0</div>
        <button class="tool-btn" onclick="hideGameOver()" style="margin-top: 20px;">Neu starten</button>
    </div>

    <div id="info-screen" class="hidden">
        <div class="modal-content glass-ui" style="flex-direction: column; width: 450px; max-height: 85vh; overflow-y: auto;">
            <h2 style="margin-top: 0;">Wahrscheinlichkeitsverteilung</h2>
            
            <h3 style="color: #ff4b4b; font-size: 0.9rem; margin: 5px 0;">💣 MINEN-RISIKO</h3>
            <svg viewBox="0 0 300 100" style="width: 100%; height: 100px;">
                <line x1="20" y1="80" x2="280" y2="80" stroke="#555" stroke-width="2"/>
                <line x1="20" y1="10" x2="20" y2="80" stroke="#555" stroke-width="2"/>
                <path id="mine-curve" d="M 20 10 Q 30 78, 280 79" stroke="#ff4b4b" stroke-width="3" fill="none" />
                <text x="22" y="95" fill="#888" font-size="9" id="mine-min-label">5%</text>
                <text x="260" y="95" fill="#888" font-size="9" id="mine-max-label">100%</text>
            </svg>

            <h3 style="color: #00ffcc; font-size: 0.9rem; margin: 15px 0 5px 0;">💎 GEM-ERTRAG</h3>
            <svg viewBox="0 0 400 100" style="width: 100%; height: 100px;">
                <line x1="20" y1="80" x2="380" y2="80" stroke="#555" stroke-width="2"/>
                <line x1="20" y1="10" x2="20" y2="80" stroke="#555" stroke-width="2"/>
                <rect id="gem-rect" x="40" y="40" width="200" height="40" fill="rgba(0, 255, 204, 0.3)" stroke="#00ffcc" stroke-width="2"/>
                <text x="35" y="95" fill="#888" font-size="9">1G</text>
                <text x="230" y="95" fill="#888" font-size="9" id="gem-max-label">10G</text>
            </svg>

            <button class="tool-btn" style="margin-top: 20px; width: 100%;" onclick="hideInfo()">Schließen</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bias Blindspot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="info-btn" onclick="showInfo()">?</button>

    <div id="ui-top-capsule" class="glass-ui">
        <div>Gems: <span id="score-val">0</span></div>
        <div>Best: <span id="highscore-val">0</span></div>
    </div>

    <div id="grid-stage"></div>

    <div id="ui-bottom-bar" class="glass-ui">
        <button id="scan-btn" class="tool-btn">
            <span class="btn-icon">🔍</span>
            <span class="btn-cost">Scan (10 Gems)</span>
        </button>
    </div>

    <div id="loader">
        <div class="scan-line"></div>
        <div class="loader-text">INITIALISIERE WELT...</div>
    </div>

    <div id="toast-message" class="hidden">Nicht genug Gems! (10 nötig)</div>

    <div id="game-over-screen" class="hidden">
        <h1 style="color: #ff4b4b;">EXPLOSION!</h1>
        <p>Du bist auf eine Mine mit <span id="mine-chance-val">0</span>% Risiko getreten.</p>
        <div id="final-score">Gems gesammelt: 0</div>
        <button class="tool-btn" onclick="hideGameOver()" style="margin-top: 20px;">Neu starten</button>
    </div>

    <div id="info-screen" class="hidden">
        <div class="modal-content glass-ui" style="flex-direction: column; width: 400px;">
            <h2>Minen-Wahrscheinlichkeitsdichte</h2>
            
            <svg viewBox="0 0 300 150" style="width: 100%; max-width: 500px; height: auto;">
                <line x1="20" y1="120" x2="280" y2="120" stroke="#555" stroke-width="2"/>
                <line x1="20" y1="20" x2="20" y2="120" stroke="#555" stroke-width="2"/>
                
                <text x="15" y="135" fill="#888" font-size="10">0%</text>
                <text x="260" y="135" fill="#888" font-size="10">100%</text>
                
                <rect x="25" y="20" width="10" height="100" fill="#ff4b4b" />
                <text x="20" y="15" fill="#ff4b4b" font-size="10" font-weight="bold">Massive Häufung bei 0%</text>

                <path d="M 35 120 Q 40 115, 100 100 T 260 115" 
                    stroke="#00ffcc" stroke-width="3" fill="none" />
                    
                <text x="100" y="80" fill="#00ffcc" font-size="10">55% Gruppe (kubisch verteilt)</text>
            </svg>

            <p style="font-size: 0.9rem; color: #ccc; margin-bottom: 20px;">
                Die Kurve zeigt, wie wahrscheinlich ein Feld mit einer bestimmten Minen-Chance generiert wird.
            </p>
            
            <button class="tool-btn" onclick="hideInfo()">Schließen</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
